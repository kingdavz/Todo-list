{% include 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>To-Do List</h1>
        <form method="POST" action="{{ url_for('signup') }}">
            <h2>Create Account</h2>
            {% if data.message %}
                <p class="msg {{data.type}}">{{ data.message }}</p>
            {% endif %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter username" minlength="3" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>

            <div class="form-links">
                <a href="{{url_for('login')}}">Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
